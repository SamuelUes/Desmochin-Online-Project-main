<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Solitaire</title>
		<style>
      html,
      body,
      .container {
        margin: 0px;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        background: #000000;
      }

      .game-controls {
        position: fixed;
        top: 20px;
        right: 20px;
        display: flex;
        gap: 12px;
        z-index: 1000;
      }

      .game-controls button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 24px;
        border-radius: 8px;
        border: 1px solid #ffd86a;
        background: linear-gradient(to bottom, #ffe079, #d99c22);
        color: #130d04;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.22em;
        cursor: pointer;
        transition: all 0.2s duration;
        box-shadow: 0 15px 35px rgba(247, 184, 50, 0.25);
      }

      .game-controls button:hover {
        transform: translateY(-2px);
        box-shadow: 0 18px 42px rgba(247, 184, 50, 0.34);
      }

      .game-controls button:active {
        transform: translateY(0);
      }

      .exit-btn {
        position: fixed !important;
        top: auto;
        bottom: 20px;
        right: 20px;
        left: auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 24px;
        border-radius: 8px;
        border: 1px solid rgba(217, 156, 34, 0.8);
        background: rgba(255, 255, 255, 0.05);
        color: white;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.22em;
        cursor: pointer;
        transition: all 0.2s duration;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .exit-btn:hover {
        transform: translateY(-2px);
        border-color: #ffd86a;
        background: rgba(247, 184, 50, 0.1);
      }

      .exit-btn:active {
        transform: translateY(0);
      }

      /* Modal Styles */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        animation: fadeIn 0.3s ease-in;
      }

      .modal-overlay.active {
        display: flex;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .modal-content {
        background: linear-gradient(135deg, #03050d 0%, #07101e 50%, #05070e 100%);
        border: 2px solid #ffd86a;
        border-radius: 16px;
        padding: 48px 40px;
        max-width: 500px;
        width: 90%;
        text-align: center;
        box-shadow: 0 20px 60px rgba(247, 184, 50, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        animation: slideUp 0.4s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .modal-content h2 {
        font-size: 32px;
        font-weight: 800;
        text-transform: uppercase;
        color: #f7b832;
        margin: 0 0 16px 0;
        letter-spacing: 0.1em;
      }

      .modal-content p {
        font-size: 18px;
        color: #e0e0e0;
        margin: 0 0 32px 0;
        line-height: 1.6;
      }

      .modal-content .trophy {
        font-size: 64px;
        margin-bottom: 20px;
        animation: bounce 1s ease-in-out infinite;
      }

      @keyframes bounce {
        0%, 100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-12px);
        }
      }

      .modal-buttons {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .modal-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 28px;
        border-radius: 8px;
        border: 1px solid #ffd86a;
        background: linear-gradient(to bottom, #ffe079, #d99c22);
        color: #130d04;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.22em;
        cursor: pointer;
        transition: all 0.2s duration;
        box-shadow: 0 15px 35px rgba(247, 184, 50, 0.25);
      }

      .modal-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 18px 42px rgba(247, 184, 50, 0.34);
      }

      .modal-btn:active {
        transform: translateY(0);
      }

      .modal-btn.secondary {
        border-color: rgba(217, 156, 34, 0.8);
        background: rgba(255, 255, 255, 0.05);
        color: white;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .modal-btn.secondary:hover {
        border-color: #ffd86a;
        background: rgba(247, 184, 50, 0.1);
      }
    </style>
		<script type="module" crossorigin src="./assets/js/index-f2f37377.js"></script>
	</head>
	<body>
		<div class="container" id="game-container"></div>
		
		<div class="game-controls">
			<button id="restart-btn" title="Reiniciar partida">↻ Reiniciar</button>
		</div>

		<button id="exit-btn" class="exit-btn" title="Volver al menú de juegos">✕ Salir</button>

		<!-- Game Won Modal -->
		<div id="gameWonModal" class="modal-overlay">
			<div class="modal-content">
				<div class="trophy">🏆</div>
				<h2>¡Felicidades!</h2>
				<p>Has completado el juego.</p>
				<p style="font-size: 16px; color: #f7b832; margin-bottom: 24px;">¡Victoria!</p>
				<div class="modal-buttons">
					<button class="modal-btn" id="modal-restart">↻ Jugar de Nuevo</button>
					<button class="modal-btn secondary" id="modal-exit">✕ Volver al Menú</button>
				</div>
			</div>
		</div>

		<script>
			// Game Won Modal Functions
			function showGameWonModal() {
				const modal = document.getElementById('gameWonModal');
				modal.classList.add('active');
			}

			function hideGameWonModal() {
				const modal = document.getElementById('gameWonModal');
				modal.classList.remove('active');
			}

			// Modal button listeners
			document.getElementById('modal-restart').addEventListener('click', function() {
				location.reload();
			});

			document.getElementById('modal-exit').addEventListener('click', function() {
				window.history.back();
			});

			// Main control buttons
			document.getElementById('restart-btn').addEventListener('click', function() {
				location.reload();
			});

			document.getElementById('exit-btn').addEventListener('click', function() {
				window.history.back();
			});

			// Expose globally for the game to call
			window.showGameWonModal = showGameWonModal;
		</script>
	</body>
</html>

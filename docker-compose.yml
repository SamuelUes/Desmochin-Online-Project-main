services:
  mongo-server:
    image: mongo:7
    container_name: desmoche-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: pharonsdb
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand('ping').ok",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    ports:
      - "5001:27017"
    volumes:
      - mongodb_data:/data/db
      - ./database/init-db.js:/docker-entrypoint-initdb.d/init-db.js:ro

  mongo-client:
    image: mongo-express:latest
    container_name: desmoche-mongo-client
    restart: unless-stopped
    depends_on:
      mongo-server:
        condition: service_healthy
    environment:
      ME_CONFIG_BASICAUTH: "false"
      ME_CONFIG_MONGODB_URL: mongodb://mongo-server:27017
    ports:
      - "8082:8081"

  backend:
    build:
      context: ./backend
    container_name: desmoche-backend
    restart: unless-stopped
    depends_on:
      mongo-server:
        condition: service_healthy
    environment:
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-me-with-at-least-32-chars}
      COOKIE_SECURE: "false"
      DB_NAME: pharonsdb
      FRONTEND_ORIGIN: http://localhost:3001
      MONGO_URL: mongodb://mongo-server:27017
      PORT: 3000
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
        NEXT_PUBLIC_SOCKET_URL: http://localhost:3000
    container_name: desmoche-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-me-with-at-least-32-chars}
      BACKEND_INTERNAL_URL: http://backend:3000
      COOKIE_SECURE: "false"
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3000
      PORT: 3000
    ports:
      - "3001:3000"

volumes:
  mongodb_data:
